{% extends 'base.html' %}
{% block title %}{{ 'Edit Stand' if stand else 'Add Stand' }}{% endblock %}
{% block content %}
<div class="card panel-card">
    <div class="card-header">{{ 'Edit Parking Stand' if stand else 'Add Parking Stand' }}</div>
    <div class="card-body">
        <form method="post" class="row g-3">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="col-md-3">
                <label class="form-label">Stand Code</label>
                <input class="form-control" name="stand_code" value="{{ stand.stand_code if stand else '' }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Stand Number</label>
                <input class="form-control" name="stand_number" value="{{ stand.stand_number if stand else '' }}" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Apron</label>
                <input class="form-control" name="apron" value="{{ stand.apron if stand else '' }}" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Category</label>
                <input class="form-control" name="category" value="{{ stand.category if stand else '' }}" placeholder="A, B, C, E, F">
            </div>
            <div class="col-md-2">
                <label class="form-label">Bridge No.</label>
                <input class="form-control" name="pbb_number" value="{{ stand.pbb_number if stand else '' }}" placeholder="PBB-01">
            </div>
            <div class="col-md-4">
                <div class="form-check mt-4">
                    <input class="form-check-input" id="has_pbb" type="checkbox" name="has_pbb" {% if stand and stand.has_pbb %}checked{% endif %}>
                    <label for="has_pbb" class="form-check-label">Has Passenger Boarding Bridge</label>
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-check mt-4">
                    <input class="form-check-input" id="is_active" type="checkbox" name="is_active" {% if not stand or stand.is_active %}checked{% endif %}>
                    <label for="is_active" class="form-check-label">Active</label>
                </div>
            </div>
            <div class="col-12">
                <label class="form-label">Notes</label>
                <textarea class="form-control" name="notes" rows="2">{{ stand.notes if stand else '' }}</textarea>
            </div>
            <div class="col-12 d-flex gap-2">
                <button class="btn btn-primary" type="submit">Save</button>
                <a class="btn btn-outline-secondary" href="{{ url_for('admin.reference_data') }}">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
