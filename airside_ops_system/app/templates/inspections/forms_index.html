{% extends 'base.html' %}
{% block title %}Inspection Forms{% endblock %}
{% block content %}
<div class='card panel-card'><div class='card-header'>Inspection Forms</div><div class='card-body'><div class='list-group'>{% for t in templates %}<a class='list-group-item list-group-item-action' href="{{ url_for('inspection.generic_form', form_number=t.form_number) }}">Form {{ t.form_number }} - {{ t.title }}</a>{% endfor %}</div></div></div>
{% endblock %}
