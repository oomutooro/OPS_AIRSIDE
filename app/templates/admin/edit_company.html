{% extends 'base.html' %}
{% block title %}{{ 'Edit Company' if company else 'Add Company' }}{% endblock %}
{% block content %}
<div class="card panel-card">
    <div class="card-header">{{ 'Edit Company' if company else 'Add Company' }}</div>
    <div class="card-body">
        <form method="post" class="row g-3">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="col-md-6">
                <label class="form-label">Company Name</label>
                <input class="form-control" name="name" value="{{ company.name if company else '' }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Code</label>
                <input class="form-control" name="code" value="{{ company.code if company else '' }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Type</label>
                <input class="form-control" name="company_type" value="{{ company.company_type if company else '' }}" placeholder="airline, GHA, fuel..." required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Contact Person</label>
                <input class="form-control" name="contact_person" value="{{ company.contact_person if company else '' }}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Phone</label>
                <input class="form-control" name="phone" value="{{ company.phone if company else '' }}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Email</label>
                <input class="form-control" name="email" type="email" value="{{ company.email if company else '' }}">
            </div>
            <div class="col-12">
                <label class="form-label">Address</label>
                <textarea class="form-control" name="address" rows="2">{{ company.address if company else '' }}</textarea>
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" id="is_active" type="checkbox" name="is_active" {% if not company or company.is_active %}checked{% endif %}>
                    <label for="is_active" class="form-check-label">Active</label>
                </div>
            </div>
            <div class="col-12 d-flex gap-2">
                <button class="btn btn-primary" type="submit">Save</button>
                <a class="btn btn-outline-secondary" href="{{ url_for('admin.reference_data') }}">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
